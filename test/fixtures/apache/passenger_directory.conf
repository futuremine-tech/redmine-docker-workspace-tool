<VirtualHost *:80>
  ServerName redmine.example.local
  Alias /redmine /var/lib/redmine/public
  <Directory "/var/lib/redmine/public">
    AllowOverride all
    Options -MultiViews
    PassengerEnabled on
  </Directory>
  PassengerRuby /usr/local/rvm/gems/ruby-3.1.0/wrappers/ruby
  RailsEnv production
</VirtualHost>
