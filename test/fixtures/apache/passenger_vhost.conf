<VirtualHost *:80>
  ServerName redmine.example.local
  DocumentRoot /var/lib/redmine/public
  <Directory /var/lib/redmine/public>
    AllowOverride all
    Options -MultiViews
  </Directory>
  PassengerRuby /usr/local/rvm/gems/ruby-3.1.0/wrappers/ruby
  PassengerAppRoot /var/lib/redmine
  RailsEnv production
</VirtualHost>
